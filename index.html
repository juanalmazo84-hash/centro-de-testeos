<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro Integral - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        h1 {
            color: #333;
            font-size: 28px;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: #d4edda;
            border: 1px solid #28a745;
            border-radius: 6px;
            color: #155724;
            font-weight: 600;
            font-size: 14px;
        }
        
        .status.error {
            background: #f8d7da;
            border-color: #e74c3c;
            color: #721c24;
        }
        
        .punto {
            width: 8px;
            height: 8px;
            background: #28a745;
            border-radius: 50%;
            animation: parpadeo 1s infinite;
        }
        
        .status.error .punto {
            background: #e74c3c;
        }
        
        @keyframes parpadeo {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }
        
        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            min-height: 80px;
            resize: vertical;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
        
        button {
            background: #667eea;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .btn-delete {
            background: #e74c3c;
            padding: 8px 12px;
            font-size: 12px;
            width: auto;
            margin-top: 10px;
        }
        
        .btn-delete:hover {
            background: #c0392b;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .product-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            transition: all 0.3s;
        }
        
        .product-card:hover {
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
        }
        
        .product-name {
            font-weight: 700;
            color: #333;
            font-size: 16px;
            margin-bottom: 8px;
        }
        
        .product-info {
            font-size: 13px;
            color: #666;
            margin-bottom: 12px;
            line-height: 1.6;
        }
        
        .product-info label {
            font-weight: 600;
            color: #333;
            margin: 0;
            display: inline;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .empty-message {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>🏛️ Centro Integral</h1>
                <p style="color: #666; margin-top: 5px; font-size: 14px;">Gestor de Productos y Proyectos</p>
            </div>
            <div class="status" id="status">
                <div class="punto"></div>
                Conectando...
            </div>
        </header>
        
        <div class="card">
            <h2>➕ Agregar Nuevo Producto</h2>
            <form id="formProducto">
                <div class="form-row">
                    <div class="form-group">
                        <label>Nombre del Producto *</label>
                        <input type="text" id="nombre" placeholder="Ej: Laptop Dell" required>
                    </div>
                    <div class="form-group">
                        <label>Cantidad *</label>
                        <input type="number" id="cantidad" placeholder="10" min="1" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Categoría</label>
                        <input type="text" id="categoria" placeholder="Ej: Electrónica">
                    </div>
                    <div class="form-group">
                        <label>Precio</label>
                        <input type="number" id="precio" placeholder="0.00" min="0" step="0.01">
                    </div>
                </div>
                <div class="form-group">
                    <label>Descripción</label>
                    <textarea id="descripcion" placeholder="Detalles adicionales del producto..."></textarea>
                </div>
                <button type="submit" id="btnAgregar">Agregar Producto</button>
            </form>
        </div>
        
        <div class="card">
            <h2>📦 Productos Registrados</h2>
            <div id="productosContainer" class="loading">
                <div class="spinner"></div>
                <p style="margin-top: 15px;">Cargando productos...</p>
            </div>
        </div>
    </div>

    <script>
        const app = {
            supabase: null,
            productos: [],
            
            async init() {
                try {
                    const { createClient } = window.supabase;
                    this.supabase = createClient(
                        'https://qwlpwetzvrtpitbntxpv.supabase.co',
                        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF3bHB3ZXR6dnJ0cGl0Ym50eHB2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzkxMjQsImV4cCI6MjA5NzExNTEyNH0.YyUMaBdJAxprcs5zERls6h30y1X4MuCkyZcS0iH48Mo'
                    );
                    
                    await this.cargarProductos();
                    this.suscribirse();
                    this.actualizarEstado(true);
                    this.configurarFormulario();
                    
                    console.log('✅ Supabase inicializado correctamente');
                } catch (error) {
                    console.error('Error:', error);
                    this.actualizarEstado(false);
                }
            },
            
            async cargarProductos() {
                try {
                    const { data, error } = await this.supabase
                        .from('products')
                        .select('*')
                        .order('created_at', { ascending: false });
                    
                    if (error) throw error;
                    this.productos = data || [];
                    this.mostrarProductos();
                } catch (error) {
                    console.error('Error cargando productos:', error);
                }
            },
            
            mostrarProductos() {
                const container = document.getElementById('productosContainer');
                
                if (this.productos.length === 0) {
                    container.innerHTML = '<div class="empty-message">📭 No hay productos registrados aún</div>';
                    return;
                }
                
                container.innerHTML = `<div class="products-grid">${this.productos.map(p => `
                    <div class="product-card">
                        <div class="product-name">${p.nombre || 'Sin nombre'}</div>
                        <div class="product-info">
                            ${p.categoria ? `<div><label>Categoría:</label> ${p.categoria}</div>` : ''}
                            ${p.cantidad ? `<div><label>Cantidad:</label> ${p.cantidad} unidades</div>` : ''}
                            ${p.precio ? `<div><label>Precio:</label> $${parseFloat(p.precio).toFixed(2)}</div>` : ''}
                            ${p.descripcion ? `<div><label>Descripción:</label> ${p.descripcion}</div>` : ''}
                        </div>
                        <button class="btn-delete" onclick="app.eliminarProducto(${p.id})">Eliminar</button>
                    </div>
                `).join('')}</div>`;
            },
            
            configurarFormulario() {
                document.getElementById('formProducto').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    
                    const nombre = document.getElementById('nombre').value.trim();
                    const cantidad = parseInt(document.getElementById('cantidad').value);
                    const categoria = document.getElementById('categoria').value.trim();
                    const precio = parseFloat(document.getElementById('precio').value) || null;
                    const descripcion = document.getElementById('descripcion').value.trim();
                    
                    if (!nombre || !cantidad) {
                        alert('Por favor completa los campos requeridos');
                        return;
                    }
                    
                    document.getElementById('btnAgregar').disabled = true;
                    
                    try {
                        const { error } = await this.supabase
                            .from('products')
                            .insert([{
                                nombre,
                                cantidad,
                                categoria: categoria || null,
                                precio,
                                descripcion: descripcion || null
                            }]);
                        
                        if (error) throw error;
                        
                        document.getElementById('formProducto').reset();
                        await this.cargarProductos();
                    } catch (error) {
                        console.error('Error:', error);
                        alert('Error al agregar producto');
                    } finally {
                        document.getElementById('btnAgregar').disabled = false;
                    }
                });
            },
            
            async eliminarProducto(id) {
                if (!confirm('¿Eliminar este producto?')) return;
                
                try {
                    const { error } = await this.supabase
                        .from('products')
                        .delete()
                        .eq('id', id);
                    
                    if (error) throw error;
                    await this.cargarProductos();
                } catch (error) {
                    console.error('Error:', error);
                    alert('Error al eliminar');
                }
            },
            
            suscribirse() {
                if (!this.supabase) return;
                
                this.supabase
                    .channel('cambios-products')
                    .on('postgres_changes',
                        { event: '*', schema: 'public', table: 'products' },
                        () => {
                            console.log('🔄 Cambio detectado - recargando...');
                            this.cargarProductos();
                        }
                    )
                    .subscribe();
            },
            
            actualizarEstado(conectado) {
                const status = document.getElementById('status');
                if (conectado) {
                    status.classList.remove('error');
                    status.innerHTML = '<div class="punto"></div> 🟢 Sincronizado en Tiempo Real';
                } else {
                    status.classList.add('error');
                    status.innerHTML = '<div class="punto"></div> 🔴 Sin conexión';
                }
            }
        };

        // Inicializar
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => app.init());
        } else {
            app.init();
        }
    </script>
</body>
</html>
